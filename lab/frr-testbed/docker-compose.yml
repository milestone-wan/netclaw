# NetClaw FRR Lab Testbed — IPv6-only (OSPFv3 + MP-BGP IPv6 unicast)
#
# Topology:
#   WSL NetClaw (AS 65001)  ──GRE──  Edge1 (AS 65000)  ──OSPFv3──  Core (RR)  ──OSPFv3──  Edge2
#   fd00::4/128                       fd00::1/128          fd00::2/128              fd00::3/128
#   fd00:ee::1/127                    fd00:ee::0/127
#   eBGP over GRE inner               iBGP hub             iBGP RR                  iBGP client
#
# Address plan (ULA fd00::/48, RFC 4193):
#   Loopbacks:       fd00::1–3/128
#   edge1–core P2P:  fd00:12::/127    (edge1: ::0, core: ::1,  RFC 6164 /127)
#   core–edge2 P2P:  fd00:23::/127    (core:  ::0, edge2: ::1, RFC 6164 /127)
#   GRE inner:       fd00:ee::/127    (edge1: ::0, WSL: ::1,   RFC 6164 /127)
#   Lab network:     fd00:dead:beef::/48  (Edge2 stub, replaces 192.168.99.0/24)
#
# Underlay transport (Docker bridges — IPv4-only, not in routing domain):
#   edge1-core:  10.0.12.0/24
#   core-edge2:  10.0.23.0/24
#   peering:     10.0.100.0/24  (GRE outer endpoint for WSL host)

services:
  edge1:
    image: frrouting/frr:latest
    container_name: netclaw-edge1
    hostname: edge1
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.default.disable_ipv6=0
    volumes:
      - ./configs/edge1/frr.conf:/etc/frr/frr.conf
      - ./configs/edge1/daemons:/etc/frr/daemons
    networks:
      edge1-core:
        ipv4_address: 10.0.12.1
      peering:
        ipv4_address: 10.0.100.1
    restart: unless-stopped

  core:
    image: frrouting/frr:latest
    container_name: netclaw-core
    hostname: core
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.default.disable_ipv6=0
    volumes:
      - ./configs/core/frr.conf:/etc/frr/frr.conf
      - ./configs/core/daemons:/etc/frr/daemons
    networks:
      edge1-core:
        ipv4_address: 10.0.12.2
      core-edge2:
        ipv4_address: 10.0.23.2
    restart: unless-stopped

  edge2:
    image: frrouting/frr:latest
    container_name: netclaw-edge2
    hostname: edge2
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.default.disable_ipv6=0
    volumes:
      - ./configs/edge2/frr.conf:/etc/frr/frr.conf
      - ./configs/edge2/daemons:/etc/frr/daemons
    networks:
      core-edge2:
        ipv4_address: 10.0.23.3
    restart: unless-stopped

networks:
  edge1-core:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.12.0/24
          gateway: 10.0.12.254
  core-edge2:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.23.0/24
          gateway: 10.0.23.254
  peering:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.100.0/24
          gateway: 10.0.100.254
